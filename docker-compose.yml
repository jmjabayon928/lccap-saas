version: '3.9'

services:
  lccap-db:
    image: postgres:16
    container_name: lccap-postgres
    restart: always
    environment:
      POSTGRES_USER: lccap_user
      POSTGRES_PASSWORD: lccap_password
      POSTGRES_DB: lccap_db
    ports:
      - "55432:5432"
    volumes:
      - lccap_pgdata:/var/lib/postgresql/data

volumes:
  lccap_pgdata: