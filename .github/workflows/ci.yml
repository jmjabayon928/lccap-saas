name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Lccap.sln

      - name: Format (verify no changes)
        run: dotnet format Lccap.sln --verify-no-changes

      - name: Build (Release)
        run: dotnet build Lccap.sln -c Release --no-restore

      - name: Test (Release)
        run: dotnet test Lccap.sln -c Release --no-build
